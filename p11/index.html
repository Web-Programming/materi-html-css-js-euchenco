<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Produk</title>
    <script src="jsfauzan.js"></script>

    <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #2c2c54);
      padding: 20px;
      color: white;
    }

    h2 {
      text-align: center;
      font-size: 32px;
      margin-bottom: 30px;
      letter-spacing: 2px;
      color: #f9ca24;
      text-transform: uppercase;
    }

    #product-container {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: #2f3640;
      border-radius: 15px;
      padding: 20px;
      width: 220px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.4);
      text-align: center;
      transition: 0.3s;
      position: relative;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card h3 {
      margin-bottom: 10px;
      color: #ffffff;
    }

    .harga-asli {
      text-decoration: line-through;
      color: #aaa;
      font-size: 14px;
    }

    .harga-diskon {
      color: #00ffae;
      font-weight: bold;
      font-size: 20px;
      margin-top: 5px;
    }

    button {
      margin-top: 12px;
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 8px;
      background: linear-gradient(45deg, #ff416c, #ff4b2b);
      color: white;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      opacity: 0.8;
    }

    button:disabled {
      background: gray;
      cursor: not-allowed;
    }

    .badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: #e84118;
      color: white;
      padding: 4px 8px;
      font-size: 12px;
      border-radius: 8px;
      font-weight: bold;
    }
  </style>

  <link rel="stylesheet" href="ojan.css">

</head>
<body>
<h2>Fauzan Store</h2>

  <div id="product-container"></div>

  <script>
    var products = [
      {
        nama: "Kursi Gaming",
        harga: 1600000,
        diskon: 2000000,
        stok: 10
      },
      {
        nama: "Meja Gaming",
        harga: 1800000,
        diskon: 0,
        stok: 0
      }
    ];

    function renderProducts() {
      var container = document.getElementById("product-container");
      container.innerHTML = "";

      products.forEach(function(product) {

        var teksHarga = "";
        var badge = "";

        if (product.diskon > 0) {
          badge = "<div class='badge'>🔥SALE</div>";

          teksHarga =
            "<div class='harga-asli'>Rp " + product.diskon.toLocaleString() + "</div>" +
            "<div class='harga-diskon'>Rp " + product.harga.toLocaleString() + "</div>";
        } else {
          teksHarga =
            "<div class='harga-diskon'>Rp " + product.harga.toLocaleString() + "</div>";
        }

        var tombol = "";
        if (product.stok > 0) {
          tombol = "<button onclick=\"beli('" + product.nama + "')\">🛒 Beli Sekarang</button>";
        } else {
          tombol = "<button disabled>❌ Stok Habis</button>";
        }

        var html =
          "<div class='card'>" +
          badge +
          "<h3>" + product.nama + "</h3>" +
          teksHarga +
          tombol +
          "</div>";

        container.innerHTML += html;
      });
    }

    function beli(nama) {
      alert("✅ Kamu membeli: " + nama);
    }

    renderProducts();
  </script>
</body>
</html>
