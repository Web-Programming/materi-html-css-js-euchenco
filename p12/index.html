<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch API</title>
</head>
<body>
    <h1>Data Mahasiswa IF</h1>
    <button id="btn-load" onclick="loadDataMhs()">Load Data Mhs</button>
    <div id="data-mhs"></div>

        <script>
            function loadDataMhs() {
                const container = document.getElementById('data-mhs');
                const btn = document.getElementById('btn-load');

             // tampilkan loading
                container.innerHTML = "Loading...";
                btn.disabled = true;

                fetch('mahasiswa.json')
                    .then(response => response.json())
                    .then(data => {
                        //test outpu di console
                        console.table(data);
                        let output = '';
                        data.forEach(mhs => {
                            output +=` 
                                <ul>
                                    <li>NPM : ${mhs.npm}</li>
                                    <li>Nama : ${mhs.nama}</li>
                                    <li>IPK : ${mhs.ipk}</li>
                                </ul>
                                <hr>    
                            `;
                        });
                        document.getElementById('data-mhs').innerHTML = output;
                        container.innerHTML = output;
                        btn.disabled = false;
                        }, 2000);
                    
                    .catch(error => {
                        container.innerHTML = "Gagal load data!";
                        console.error(error);
                        btn.disabled = false;
                    });
                    
                }
        </script>
    
</body>
</html>
