<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Gempa BMKG</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: #f5f7fb;
            font-family: 'Segoe UI', sans-serif;
        }

        .navbar {
            background: linear-gradient(90deg, #0d6efd, #0b5ed7);
        }

        .card {
            border: none;
            border-radius: 16px;
        }

        .shadow-soft {
            box-shadow: 0 6px 25px rgba(0,0,0,0.08);
        }
        #map {
            height: 400px;
            border-radius: 16px;
        }

        tr:hover {
            background-color: #eef3ff;
        }

        .badge-mag {
            padding: 6px 10px;
            border-radius: 10px;
        }

        .alert {
            border-radius: 12px;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(10px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark shadow">
    <div class="container">
        <span class="navbar-brand fw-bold">🌍 Dashboard Gempa BMKG</span>
    </div>
</nav>

<div class="container mt-4">

    <!-- GEMPA TERBARU -->
    <div class="card shadow-soft mb-4">
        <div class="card-body" id="gempa-terbaru">Loading...</div>
    </div>

    <!-- POTENSI -->
    <div class="card shadow-soft mb-4">
        <div class="card-header fw-semibold">⚠️ Potensi Dampak Gempa</div>
        <div class="card-body" id="potensi">Loading...</div>
    </div>

    <!-- MAP -->
    <div class="card shadow-soft mb-4">
        <div class="card-header fw-semibold">🗺️ Peta Gempa</div>
        <div class="card-body p-0">
            <div id="map"></div>
        </div>
    </div>

    <!-- CHART -->
    <div class="card shadow-soft mb-4">
        <div class="card-header fw-semibold">📈 Grafik Magnitudo</div>
        <div class="card-body">
            <canvas id="chartGempa"></canvas>
        </div>
    </div>

    <!-- TABEL -->
    <div class="card shadow-soft">
        <div class="card-header fw-semibold">📊 15 Gempa Terakhir</div>
        <div class="card-body">
            <table class="table align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Tanggal</th>
                        <th>Jam</th>
                        <th>Lokasi</th>
                        <th>Magnitudo</th>
                    </tr>
                </thead>
                <tbody id="gempa-list"></tbody>
            </table>
        </div>
    </div>

</div>

<script>
// ================= MAP =================
var map = L.map('map').setView([-2.5, 118], 5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var marker;
var markersLayer = L.layerGroup().addTo(map);

// ================= GEMPA TERBARU =================
fetch('https://data.bmkg.go.id/DataMKG/TEWS/autogempa.json')
.then(res => res.json())
.then(data => {
    const g = data.Infogempa.gempa;

    let lat = parseFloat(g.Lintang);
    let lon = parseFloat(g.Bujur);

    // tampil info
    document.getElementById('gempa-terbaru').innerHTML = `
        <div class="row text-center">
            <div class="col-md-3">
                <h6 class="text-muted">Tanggal</h6>
                <h5>${g.Tanggal}</h5>
            </div>
            <div class="col-md-3">
                <h6 class="text-muted">Jam</h6>
                <h5>${g.Jam}</h5>
            </div>
            <div class="col-md-3">
                <h6 class="text-muted">Magnitudo</h6>
                <span class="badge bg-danger badge-mag">${g.Magnitude}</span>
            </div>
            <div class="col-md-3">
                <h6 class="text-muted">Kedalaman</h6>
                <h5>${g.Kedalaman}</h5>
            </div>
        </div>
        <div class="mt-3 text-center fw-semibold text-primary">
            📍 ${g.Wilayah}
        </div>
    `;

    // marker utama
    marker = L.marker([lat, lon]).addTo(map)
        .bindPopup(g.Wilayah)
        .openPopup();

    map.setView([lat, lon], 7);

    // ================= POTENSI =================
    let potensi = g.Potensi;

    let warna = "success";
    let icon = "✅";

    if (potensi.toLowerCase().includes("tidak")) {
        warna = "success";
        icon = "✅";
    } else if (potensi.toLowerCase().includes("dirasakan")) {
        warna = "warning";
        icon = "⚠️";
    } else {
        warna = "danger";
        icon = "🚨";
    }

    document.getElementById('potensi').innerHTML = `
        <div class="alert alert-${warna} d-flex align-items-center">
            <div class="fs-3 me-3">${icon}</div>
            <div>
                <h6 class="mb-1">Status Potensi</h6>
                <b>${potensi}</b>
            </div>
        </div>
    `;
});

// ================= GEMPA TERKINI =================
fetch('https://data.bmkg.go.id/DataMKG/TEWS/gempaterkini.json')
.then(res => res.json())
.then(data => {
    const list = data.Infogempa.gempa;

    let rows = "";
    let labels = [];
    let magnitudes = [];

    list.forEach((g, i) => {
        let lat = parseFloat(g.Lintang);
        let lon = parseFloat(g.Bujur);
        let mag = parseFloat(g.Magnitude);

        let badgeColor = mag >= 5 ? 'danger' : 'success';

        // marker
        L.marker([lat, lon])
            .bindPopup(g.Wilayah)
            .addTo(markersLayer);

        // tabel
        rows += `
        <tr onclick="focusMap('${lat}','${lon}','${g.Wilayah}','${g.Magnitude}')" style="cursor:pointer">
            <td>${g.Tanggal}</td>
            <td>${g.Jam}</td>
            <td>📍 ${g.Wilayah}</td>
            <td><span class="badge bg-${badgeColor} badge-mag">${g.Magnitude}</span></td>
        </tr>`;

        labels.push(i+1);
        magnitudes.push(mag);
    });

    document.getElementById('gempa-list').innerHTML = rows;

    // ================= CHART =================
    new Chart(document.getElementById('chartGempa'), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Magnitudo Gempa',
                data: magnitudes,
                borderWidth: 2,
                tension: 0.3
            }]
        }
    });
});

// ================= FOCUS MAP =================
function focusMap(lat, lon, wilayah, mag) {
    lat = parseFloat(lat);
    lon = parseFloat(lon);

    if (marker) map.removeLayer(marker);

    marker = L.marker([lat, lon]).addTo(map)
        .bindPopup(`<b>${wilayah}</b><br>Magnitudo: ${mag}`)
        .openPopup();

    map.setView([lat, lon], 7);
}
</script>

</body>
</html>
