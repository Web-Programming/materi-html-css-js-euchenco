<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* selektor tag html*/
        body {
            background-color: yellow;
            border-top-style: solid;
            border-top-width: 5px;
            border-top-color: brown;
            border-radius: 10px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        h1 {
            font-family: Arial, Helvetica, sans-serif;
        }

        h2 {
            font-size: 12pt;
            text-align: center;
            text-decoration: underline;
        }

        div {
            border-radius: 8px;
            border: 3px dotted red;
            text-align: center;
            margin: 20px 10px 5px 10px;
        }

        /*selektor class */
        .border-merah {
            border-color: red !important;
        }
        .border-biru {
            border-color: blue;
        }
        .border-solid{
            border-style: solid;
            border-width: 5px;
        }
    </style>
    <link rel="stylesheet" href="css/gaya.css">
</head>

<body>
    <h1 style="color: aqua; background-color: brown;">Mengenal CSS</h1>
    <h1 style="color: red; font-family: 'Courier New', Courier, monospace;">Ini text bewarna merah</h1>
    <h2
        style="color: orange; font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;">
        HAHAHHHHHAAAAAAAAAAAAAAAAAAAAAA
    </h2>
    <div class="border-merah">
        SADAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
    </div>
    <div class="border-biru border-solid border-merah">
        MENGGUNAKAN selektor CLASS
    </div>
    <div>
        MENGGUNAKAN SELEKTOR CLASS LAINNYA
    </div>

</body>

</html>
